<!DOCTYPE html>  
<html lang="ko">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>크로마 제국 번역기</title>  
    <script src="https://unpkg.com/hangul-js" type="text/javascript"></script>  
    <style>  
        body {  
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;  
            background-color: #f4f4f6;  
            color: #333;  
            display: flex;  
            flex-direction: column;  
            align-items: center;  
            padding: 40px 20px;  
            margin: 0;  
        }  
        h1 {  
            color: #2c3e50;  
            margin-bottom: 10px;  
        }  
        p.desc {  
            color: #7f8c8d;  
            margin-bottom: 30px;  
            text-align: center;  
        }  
        textarea {  
            width: 100%;  
            max-width: 600px;  
            height: 100px;  
            padding: 15px;  
            font-size: 18px;  
            border: 2px solid #ddd;  
            border-radius: 12px;  
            resize: none;  
            outline: none;  
            transition: border-color 0.3s;  
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);  
        }  
        textarea:focus {  
            border-color: #5A9BF5;  
        }  
        #output {  
            margin-top: 40px;  
            width: 100%;  
            max-width: 900px;  
            display: flex;  
            flex-wrap: wrap;  
            gap: 30px; /* 드라마틱한 형태를 위해 간격을 더 넓힘 */  
            justify-content: center;  
            align-items: center;  
            min-height: 250px;  
            padding: 30px;  
            background: white;  
            border-radius: 16px;  
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);  
            overflow: visible;  
        }  
        .space {  
            width: 50px;  
        }  
        .non-hangul {  
            font-size: 28px;  
            line-height: 120px;  
            color: #999;  
        }  
    </style>  
</head>  
<body>  
  
    <h1>크로마 색채 문자 번역기</h1>  
    <p class="desc">한국어를 크로마어로 실시간 번역합니다.</p>  
  
    <textarea id="inputText" placeholder="여기에 한국어를 입력해 주세요."></textarea>  
  
    <div id="output"></div>  
  
    <script>  
        const chromaColors = {  
            consonants: {  
                'ㄱ': '#F9F2A9', 'ㄴ': '#F7BDEF', 'ㄷ': '#315F36', 'ㄹ': '#CB5244',  
                'ㅁ': '#B6F1FA', 'ㅂ': '#E8A73E', 'ㅅ': '#84182B', 'ㅇ': '#A2FBCE',  
                'ㅈ': '#BEB086', 'ㅊ': '#CD352C', 'ㅋ': '#CED7A7', 'ㅌ': '#5E7A77',  
                'ㅍ': '#B96696', 'ㅎ': '#F4928E', 'ㄲ': '#F9E64F', 'ㄸ': '#1B3C23',  
                'ㅃ': '#A87926', 'ㅆ': '#460613', 'ㅉ': '#81724B'  
            },  
            vowels: {  
                'ㅏ': '#C2DBB6', 'ㅑ': '#EC703E', 'ㅓ': '#3E0B7A', 'ㅕ': '#8C307C',  
                'ㅗ': '#F5C18F', 'ㅛ': '#D9F742', 'ㅜ': '#020A8C', 'ㅠ': '#5A9BF5',  
                'ㅡ': '#D63E86', 'ㅣ': '#E1E1F7', 'ㅐ': '#98AF92', 'ㅒ': '#AFB0A5',  
                'ㅔ': '#A294DE', 'ㅖ': '#BED7ED', 'ㅘ': '#E9E6C3', 'ㅙ': '#82D17F',  
                'ㅚ': '#D5B2D6', 'ㅢ': '#A961E6'  
            }  
        };  
  
        const inputText = document.getElementById('inputText');  
        const output = document.getElementById('output');  
  
        inputText.addEventListener('input', () => {  
            const text = inputText.value;  
            output.innerHTML = '';  
  
            for (let i = 0; i < text.length; i++) {  
                const char = text[i];  
                if (char === ' ') {  
                    output.innerHTML += `<div class="space"></div>`;  
                } else if (Hangul.isHangul(char)) {  
                    const disassembled = Hangul.d(char, true)[0];  
                    const cho = disassembled[0];  
                    const jung = disassembled[1];  
                    const jong = disassembled[2];  
                    output.innerHTML += generateSVG(cho, jung, jong);  
                } else {  
                    output.innerHTML += `<div class="non-hangul">${char}</div>`;  
                }  
            }  
        });  
  
        function generateId() {  
            return 'chroma_' + Math.random().toString(36).substr(2, 9);  
        }  
  
        // 극단적으로 왜곡된 블롭(자유곡선) 생성  
        function generateRandomBlobPath(x, y, baseRadius, variance) {  
            // 점의 개수를 랜덤하게 하여 형태의 각진 정도도 무작위화 (5~9개)  
            const points = Math.floor(Math.random() * 5) + 5;   
            const pathData = [];  
            const angleStep = (Math.PI * 2) / points;  
  
            for (let i = 0; i < points; i++) {  
                // 각도 자체에도 약간의 무작위성을 부여  
                const angle = (i * angleStep) + ((Math.random() - 0.5) * 0.5);  
                // Jitter(왜곡) 범위를 대폭 증가  
                const jitter = (Math.random() * 2 - 1) * variance;   
                const radius = baseRadius + jitter;  
                const px = x + Math.cos(angle) * Math.max(5, radius); // 최소 반지름 보장  
                const py = y + Math.sin(angle) * Math.max(5, radius);  
                pathData.push({ x: px, y: py });  
            }  
            pathData.push(pathData[0]);  
  
            let pathString = `M ${pathData[0].x} ${pathData[0].y}`;  
            for (let i = 0; i < points; i++) {  
                const p1 = pathData[i];  
                const p2 = pathData[i+1];  
                const cp1x = p1.x + (p2.x - p1.x) / 3;  
                const cp1y = p1.y + (p2.y - p1.y) / 3;  
                const cp2x = p2.x - (p2.x - p1.x) / 3;  
                const cp2y = p2.y - (p2.y - p1.y) / 3;  
                pathString += ` C ${cp1x} ${cp1y} ${cp2x} ${cp2y} ${p2.x} ${p2.y}`;  
            }  
            pathString += ' Z';  
            return pathString;  
        }  
  
        // 극단적으로 찌그러진 쿠션/사각형 생성  
        function generateRandomSquirclePath(x, y, size, variance) {  
            const jitter = () => (Math.random() * 2 - 1) * variance;  
            // 각 모서리의 기준 크기 자체를 심하게 왜곡  
            const s1 = size + jitter();  
            const s2 = size + jitter();  
            const s3 = size + jitter();  
            const s4 = size + jitter();  
              
            const c1 = s1 * 0.6; const c2 = s2 * 0.6;  
            const c3 = s3 * 0.6; const c4 = s4 * 0.6;  
  
            const p1 = {x: x - s1, y: y};  
            const cp1_1 = {x: x - s1, y: y - c1};  
            const cp1_2 = {x: x - c2, y: y - s2};  
            const p2 = {x: x, y: y - s2};  
              
            const cp2_1 = {x: x + c2, y: y - s2};  
            const cp2_2 = {x: x + s3, y: y - c3};  
            const p3 = {x: x + s3, y: y};  
              
            const cp3_1 = {x: x + s3, y: y + c3};  
            const cp3_2 = {x: x + c4, y: y + s4};  
            const p4 = {x: x, y: y + s4};  
              
            const cp4_1 = {x: x - c4, y: y + s4};  
            const cp4_2 = {x: x - s1, y: y + c1};  
  
            return `M ${p1.x} ${p1.y} C ${cp1_1.x} ${cp1_1.y} ${cp1_2.x} ${cp1_2.y} ${p2.x} ${p2.y} C ${cp2_1.x} ${cp2_1.y} ${cp2_2.x} ${cp2_2.y} ${p3.x} ${p3.y} C ${cp3_1.x} ${cp3_1.y} ${cp3_2.x} ${cp3_2.y} ${p4.x} ${p4.y} C ${cp4_1.x} ${cp4_1.y} ${cp4_2.x} ${cp4_2.y} ${p1.x} ${p1.y} Z`;  
        }  
  
        function generateSVG(cho, jung, jong) {  
            const idPrefix = generateId();  
  
            const colorCho = chromaColors.consonants[cho] || '#eeeeee';  
            const colorJung = chromaColors.vowels[jung] || '#dddddd';  
            let colorJong = '';  
            if (jong) {  
                colorJong = chromaColors.consonants[jong] || '#cccccc';  
            }  
  
            // 부드러운 외곽선 섞임을 위한 블러 필터 정의 (투명도 조작 없이 순수 블러)  
            const defs = `  
                <defs>  
                    <filter id="blur_${idPrefix}" x="-50%" y="-50%" width="200%" height="200%">  
                        <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>  
                    </filter>  
                </defs>  
            `;  
  
            const shapeTypes = ['ellipse', 'blob', 'squircle'];  
            const shapeType = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];  
  
            function generateShape(size, type, color) {  
                const x = 60, y = 60; // 캔버스 중심을 여유있게 이동  
                let shapeElement = '';  
  
                if (type === 'ellipse') {  
                    // 완전히 타원형으로 심하게 찌그러질 수 있도록 조정  
                    const rx = size * (0.5 + Math.random() * 1.0);   
                    const ry = size * (0.5 + Math.random() * 1.0);  
                    // 타원이 회전하도록 설정 (더 불규칙하게 보임)  
                    const rotate = Math.floor(Math.random() * 180);  
                    shapeElement = `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" transform="rotate(${rotate} ${x} ${y})"/>`;  
                } else if (type === 'blob') {  
                    // 형태의 Jitter(왜곡) 정도를 기존보다 2배 이상 높임  
                    const variance = size * 0.6;   
                    shapeElement = `<path d="${generateRandomBlobPath(x, y, size, variance)}"/>`;  
                } else if (type === 'squircle') {  
                    // Jitter 정도를 대폭 증가  
                    const variance = size * 0.4;  
                    shapeElement = `<path d="${generateRandomSquirclePath(x, y, size, variance)}"/>`;  
                }  
  
                // 단색(100% 발색)으로 채우고 개별적으로 블러 적용  
                return `<g fill="${color}" filter="url(#blur_${idPrefix})">${shapeElement}</g>`;  
            }  
  
            // 기본 크기도 살짝 조절하여 더 과감한 왜곡이 가능하게 함  
            const outerLayer = generateShape(40, shapeType, colorCho);  
            const innerLayer = generateShape(25, shapeType, colorJung);  
            const coreLayer = jong ? generateShape(12, shapeType, colorJong) : '';  
  
            // 캔버스 사이즈를 키워서 과감한 형태가 잘리지 않도록 함  
            return `  
                <svg width="140" height="140" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">  
                    ${defs}  
                    ${outerLayer}  
                    ${innerLayer}  
                    ${coreLayer}  
                </svg>  
            `;  
        }  
    </script>  
</body>  
</html>
