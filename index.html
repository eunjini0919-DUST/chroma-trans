<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크로마어 번역기</title>
    <script src="https://unpkg.com/hangul-js" type="text/javascript"></script>
    <style>
        /* 화면의 경계를 없애고 전체를 캔버스로 사용 */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f4f4f6;
            color: #333;
            margin: 0;
            overflow: hidden; /* 스크롤바 제거, 무한한 공간감 */
            width: 100vw;
            height: 100vh;
        }

        /* UI 영역을 투명하게 띄워서 문자 감상을 방해하지 않도록 배치 */
        .ui-header {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none; /* 글자 클릭 방지 */
        }
        h1 {
            color: #2c3e50;
            margin: 0 0 10px 0;
            font-size: 28px;
            letter-spacing: 2px;
        }
        p.desc {
            color: #7f8c8d;
            margin: 0;
            font-size: 14px;
        }

        /* 입력창은 화면 하단에 고정 */
        .input-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            z-index: 10;
        }
        textarea {
            width: 100%;
            height: 80px;
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px); /* 배경을 흐리게 하여 유리 같은 질감 */
            resize: none;
            outline: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            line-height: 40px;
        }

        /* 출력 공간 (전체 화면) */
        #output {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none; /* UI 클릭을 방해하지 않음 */
        }

        /* 각 문자의 절대 좌표 배치를 위한 클래스 */
        .chroma-char {
            position: absolute;
            transform: translate(-50%, -50%);
            mix-blend-mode: multiply; /* 색상들이 겹칠 때 자연스럽게 섞이게 만듦 */
            transition: all 0.5s ease-out;
        }
    </style>
</head>
<body>

    <div class="ui-header">
        <h1>크로마어 번역기</h1>
        <p class="desc">한국어를 크로마어로 실시간 번역합니다.</p>
    </div>

    <div id="output"></div>

    <div class="input-container">
        <textarea id="inputText" placeholder="한국어를 입력하세요"></textarea>
    </div>

    <script>
        const chromaColors = {
            consonants: {
                'ㄱ': '#F9F2A9', 'ㄴ': '#F7BDEF', 'ㄷ': '#315F36', 'ㄹ': '#CB5244',
                'ㅁ': '#B6F1FA', 'ㅂ': '#E8A73E', 'ㅅ': '#84182B', 'ㅇ': '#A2FBCE',
                'ㅈ': '#BEB086', 'ㅊ': '#CD352C', 'ㅋ': '#CED7A7', 'ㅌ': '#5E7A77',
                'ㅍ': '#B96696', 'ㅎ': '#F4928E', 'ㄲ': '#F9E64F', 'ㄸ': '#1B3C23',
                'ㅃ': '#A87926', 'ㅆ': '#460613', 'ㅉ': '#81724B'
            },
            vowels: {
                'ㅏ': '#C2DBB6', 'ㅑ': '#EC703E', 'ㅓ': '#3E0B7A', 'ㅕ': '#8C307C',
                'ㅗ': '#F5C18F', 'ㅛ': '#D9F742', 'ㅜ': '#020A8C', 'ㅠ': '#5A9BF5',
                'ㅡ': '#D63E86', 'ㅣ': '#E1E1F7', 'ㅐ': '#98AF92', 'ㅒ': '#AFB0A5',
                'ㅔ': '#A294DE', 'ㅖ': '#BED7ED', 'ㅘ': '#E9E6C3', 'ㅙ': '#82D17F',
                'ㅚ': '#D5B2D6', 'ㅢ': '#A961E6'
            }
        };

        const inputText = document.getElementById('inputText');
        const output = document.getElementById('output');

        inputText.addEventListener('input', () => {
            const text = inputText.value;
            output.innerHTML = '';

            // 1. 유효한 한글 문자만 필터링 (기호나 띄어쓰기는 무시하여 심볼의 응집성 유지)
            const validChars = [];
            for (let i = 0; i < text.length; i++) {
                if (Hangul.isHangul(text[i])) validChars.push(text[i]);
            }

            if (validChars.length === 0) return;

            // 2. 캔버스 중앙 좌표 및 군집 반경 설정
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // 글자 수가 많아질수록 흩어지는 반경(Radius)이 넓어짐
            // 시작 크기를 30으로 잡고, 1글자 추가될 때마다 15px씩 팽창
            const maxRadius = 30 + (validChars.length * 15); 

            // 3. 각 문자마다 랜덤 위치 부여
            validChars.forEach((char) => {
                // 중심점(Center)을 기준으로 360도 무작위 각도 생성
                const angle = Math.random() * Math.PI * 2;
                // 반경 내에서 고르게 퍼지도록 제곱근 사용
                const distance = Math.sqrt(Math.random()) * maxRadius; 

                // 최종 X, Y 좌표 계산
                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;

                const disassembled = Hangul.d(char, true)[0];
                const cho = disassembled[0];
                const jung = disassembled[1];
                const jong = disassembled[2];

                // SVG 생성 후, 계산된 위치(x, y)에 절대 위치로 배치
                const svgContent = generateSVG(cho, jung, jong);
                output.innerHTML += `<div class="chroma-char" style="left: ${x}px; top: ${y}px;">${svgContent}</div>`;
            });
        });

        function generateId() {
            return 'chroma_' + Math.random().toString(36).substr(2, 9);
        }

        function generateRandomBlobPath(x, y, baseRadius, variance) {
            const points = Math.floor(Math.random() * 5) + 5; 
            const pathData = [];
            const angleStep = (Math.PI * 2) / points;

            for (let i = 0; i < points; i++) {
                const angle = (i * angleStep) + ((Math.random() - 0.5) * 0.5);
                const jitter = (Math.random() * 2 - 1) * variance; 
                const radius = baseRadius + jitter;
                const px = x + Math.cos(angle) * Math.max(5, radius); 
                const py = y + Math.sin(angle) * Math.max(5, radius);
                pathData.push({ x: px, y: py });
            }
            pathData.push(pathData[0]);

            let pathString = `M ${pathData[0].x} ${pathData[0].y}`;
            for (let i = 0; i < points; i++) {
                const p1 = pathData[i];
                const p2 = pathData[i+1];
                const cp1x = p1.x + (p2.x - p1.x) / 3;
                const cp1y = p1.y + (p2.y - p1.y) / 3;
                const cp2x = p2.x - (p2.x - p1.x) / 3;
                const cp2y = p2.y - (p2.y - p1.y) / 3;
                pathString += ` C ${cp1x} ${cp1y} ${cp2x} ${cp2y} ${p2.x} ${p2.y}`;
            }
            pathString += ' Z';
            return pathString;
        }

        function generateRandomSquirclePath(x, y, size, variance) {
            const jitter = () => (Math.random() * 2 - 1) * variance;
            const s1 = size + jitter();
            const s2 = size + jitter();
            const s3 = size + jitter();
            const s4 = size + jitter();
            
            const c1 = s1 * 0.6; const c2 = s2 * 0.6;
            const c3 = s3 * 0.6; const c4 = s4 * 0.6;

            const p1 = {x: x - s1, y: y};
            const cp1_1 = {x: x - s1, y: y - c1};
            const cp1_2 = {x: x - c2, y: y - s2};
            const p2 = {x: x, y: y - s2};
            const cp2_1 = {x: x + c2, y: y - s2};
            const cp2_2 = {x: x + s3, y: y - c3};
            const p3 = {x: x + s3, y: y};
            const cp3_1 = {x: x + s3, y: y + c3};
            const cp3_2 = {x: x + c4, y: y + s4};
            const p4 = {x: x, y: y + s4};
            const cp4_1 = {x: x - c4, y: y + s4};
            const cp4_2 = {x: x - s1, y: y + c1};

            return `M ${p1.x} ${p1.y} C ${cp1_1.x} ${cp1_1.y} ${cp1_2.x} ${cp1_2.y} ${p2.x} ${p2.y} C ${cp2_1.x} ${cp2_1.y} ${cp2_2.x} ${cp2_2.y} ${p3.x} ${p3.y} C ${cp3_1.x} ${cp3_1.y} ${cp3_2.x} ${cp3_2.y} ${p4.x} ${p4.y} C ${cp4_1.x} ${cp4_1.y} ${cp4_2.x} ${cp4_2.y} ${p1.x} ${p1.y} Z`;
        }

        function generateSVG(cho, jung, jong) {
            const idPrefix = generateId();

            const colorCho = chromaColors.consonants[cho] || '#eeeeee';
            const colorJung = chromaColors.vowels[jung] || '#dddddd';
            let colorJong = '';
            if (jong) {
                colorJong = chromaColors.consonants[jong] || '#cccccc';
            }

            const defs = `
                <defs>
                    <filter id="blur_${idPrefix}" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
                    </filter>
                </defs>
            `;

            const shapeTypes = ['ellipse', 'blob', 'squircle'];
            const shapeType = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];

            function generateShape(size, type, color) {
                const x = 70, y = 70; // 잘림 방지를 위해 캔버스 중앙 이동
                let shapeElement = '';

                if (type === 'ellipse') {
                    const rx = size * (0.5 + Math.random() * 1.0); 
                    const ry = size * (0.5 + Math.random() * 1.0);
                    const rotate = Math.floor(Math.random() * 180);
                    shapeElement = `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" transform="rotate(${rotate} ${x} ${y})"/>`;
                } else if (type === 'blob') {
                    const variance = size * 0.6; 
                    shapeElement = `<path d="${generateRandomBlobPath(x, y, size, variance)}"/>`;
                } else if (type === 'squircle') {
                    const variance = size * 0.4;
                    shapeElement = `<path d="${generateRandomSquirclePath(x, y, size, variance)}"/>`;
                }

                return `<g fill="${color}" filter="url(#blur_${idPrefix})">${shapeElement}</g>`;
            }

            // 블러 크기가 커진 것을 감안하여 글자 자체의 기본 크기를 조금 키움
            const outerLayer = generateShape(50, shapeType, colorCho);
            const innerLayer = generateShape(30, shapeType, colorJung);
            const coreLayer = jong ? generateShape(15, shapeType, colorJong) : '';

            return `
                <svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
                    ${defs}
                    ${outerLayer}
                    ${innerLayer}
                    ${coreLayer}
                </svg>
            `;
        }
    </script>
</body>
</html>
